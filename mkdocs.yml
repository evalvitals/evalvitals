site_name: EvalVitals
site_description: Failure case analysis for LLMs and VLMs
site_url: https://evalvitals.github.io/evalvitals
repo_url: https://github.com/evalvitals/evalvitals
repo_name: evalvitals/evalvitals

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Exploratory Analysis (M2/M3): m2_analysis.md
  - Analyzer Zoo: analyzers.md
  - Architecture: architecture.md
  - Extending: extending.md
  - Roadmap: roadmap.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - tables