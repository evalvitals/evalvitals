# deco_miss — POPE miss subset (present object answered "No"); fixable by an
# internals-write intervention, so the loop can close to a *validated* fix.
model: qwen3-vl-2b-instruct   # also available: 4b / 8b (build_cases.py)

max_correct: 120              # cap correct (PASS) cases; every MISS is kept

# Judge for M1 selection / M2 / M3 / M5 + codegen coder — both are claude -p CLI
# calls; fable-5 is currently unavailable, so both use opus-4-8 low effort.
judge_model: claude-opus-4-8
judge_effort: low
codegen_model: claude-opus-4-8
codegen_effort: low
codegen_budget_usd: 2.0
codegen_timeout_sec: 240

# Fix module: allow internals-write (L3b) — the miss slice is where an
# image-evidence / decoding intervention can actually flip failures.
fix_max_tier: L3b
fix_validation_cases: 60
fix_exec_timeout_sec: 900
