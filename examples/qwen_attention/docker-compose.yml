services:
  qwen_attention:
    build:
      context: ../..
      dockerfile: examples/qwen_attention/Dockerfile
    image: evalvitals-qwen-attention
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - HF_HOME=/models
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/models