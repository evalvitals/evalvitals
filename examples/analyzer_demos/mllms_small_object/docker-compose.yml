services:
  mllms_small_object:
    build:
      context: ../../..
      dockerfile: examples/analyzer_demos/mllms_small_object/Dockerfile
    image: evalvitals-mllms-small-object
    environment:
      # Use PCI-bus device ordering so CUDA_VISIBLE_DEVICES matches nvidia-smi.
      # Pick a GPU with free memory: export CUDA_VISIBLE_DEVICES=2
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - HF_HOME=/hf_cache
      - HOME=/home/user
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/hf_cache
      - ./outputs:/app/example/outputs
      - ${AGY_PATH:-~/.local/bin/agy}:/usr/local/bin/agy:ro
      - ~/.gemini:/home/user/.gemini
      - ~/.cache/antigravity:/home/user/.cache/antigravity
      - /data/rjin02/evalvitals/textvqa_mllms_know:/data/rjin02/evalvitals/textvqa_mllms_know:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      python run.py
        --model qwen3-vl-4b-instruct
        --device cuda
        --dtype bfloat16
        --max-cycles 3
        --max-analyzers 3
