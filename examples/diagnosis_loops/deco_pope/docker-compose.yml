services:
  deco_pope:
    build:
      context: ../../..
      dockerfile: examples/diagnosis_loops/deco_pope/Dockerfile
    image: evalvitals-deco-pope
    environment:
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - HF_HOME=/hf_cache
      # claude reads its OAuth state from $HOME; IS_SANDBOX lets it accept
      # --dangerously-skip-permissions as root (rootless Docker maps to the
      # unprivileged host user anyway). Mirrors examples/diagnosis_loops/qwen_loop_claude.
      - HOME=/home/user
      - IS_SANDBOX=1
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/hf_cache
      - ./outputs:/app/example/outputs
      - ./data:/app/example/data        # frozen manifests + cached COCO images
      # Judge for M2/M3/M5 (ClaudeModel) — mount the NATIVE claude binary:
      #   export CLAUDE_PATH=$(ls -d ~/.vscode-server/extensions/anthropic.claude-code-*/resources/native-binary/claude | sort -V | tail -1)
      - ${CLAUDE_PATH:-~/.local/bin/claude}:/usr/local/bin/claude:ro
      - ~/.claude:/home/user/.claude
      - ~/.claude.json:/home/user/.claude.json
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      python run.py --model qwen3-vl-8b-instruct
