services:
  qwen_loop_claude:
    build:
      context: ../../..
      dockerfile: examples/diagnosis_loops/qwen_loop_claude/Dockerfile
    image: evalvitals-qwen-loop-claude
    # Required before first run (mount the NATIVE claude binary, not the wrapper):
    #   export CLAUDE_PATH=$(ls -d ~/.vscode-server/extensions/anthropic.claude-code-*/resources/native-binary/claude | sort -V | tail -1)
    # Optional (agy as secondary provider): export AGY_PATH=$(which agy)
    environment:
      # Make CUDA_VISIBLE_DEVICES match `nvidia-smi` indices (default CUDA
      # ordering can map index 0 to a different physical card) so you can pick a
      # GPU with free memory: export CUDA_VISIBLE_DEVICES=6
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}  # override: export CUDA_VISIBLE_DEVICES=2
      # Reduce CUDA fragmentation OOMs on shared GPUs.
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - HF_HOME=/hf_cache
      # agy/claude read their OAuth state from $HOME — point HOME at the
      # location we mount the auth directories below.
      - HOME=/home/user
      # Claude Code refuses --dangerously-skip-permissions as root unless this
      # container escape hatch is set (the container user is root under
      # rootless Docker, which maps to the unprivileged host user anyway).
      - IS_SANDBOX=1
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/hf_cache
      - ./outputs:/app/example/outputs        # run logs persisted to host
      # agy binary — mount from host so no install is needed inside the image.
      # Set AGY_PATH before running: export AGY_PATH=$(which agy)
      - ${AGY_PATH:-~/.local/bin/agy}:/usr/local/bin/agy:ro
      # agy auth + project state — must be read-write so agy can create
      # project config files when starting a new conversation.
      - ~/.gemini:/home/user/.gemini
      # agy cache — read/write so the container can reuse cached responses.
      - ~/.cache/antigravity:/home/user/.cache/antigravity
      # claude CLI — must be the NATIVE binary, not the ~/.local/bin wrapper
      # script (the wrapper resolves paths under ~/.vscode-server which is not
      # mounted). Before running:
      #   export CLAUDE_PATH=$(ls -d ~/.vscode-server/extensions/anthropic.claude-code-*/resources/native-binary/claude | sort -V | tail -1)
      - ${CLAUDE_PATH:-~/.local/bin/claude}:/usr/local/bin/claude:ro
      # claude auth + session state — read-write (the CLI updates them).
      - ~/.claude:/home/user/.claude
      - ~/.claude.json:/home/user/.claude.json
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      python run.py
        --model qwen3-vl-4b-instruct
        --device cuda
        --dtype bfloat16
        --scenario vqa-rad
        --judge-provider claude
        --max-cycles 2
        --max-analyzers 3
