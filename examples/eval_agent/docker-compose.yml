services:
  eval_agent:
    build:
      context: ../..
      dockerfile: examples/eval_agent/Dockerfile
    image: evalvitals-eval-agent
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Records the code version in run_log.jsonl (the slim image ships no git,
      # so the logger can't read the commit itself). Export before bringing it
      # up:  export EVALVITALS_GIT_COMMIT=$(git rev-parse --short HEAD)
      - EVALVITALS_GIT_COMMIT=${EVALVITALS_GIT_COMMIT:-}
    volumes:
      - ./outputs:/app/example/outputs
