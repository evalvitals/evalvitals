services:
  deco_pope:
    build:
      context: ../..
      dockerfile: examples/deco_pope/Dockerfile
    image: evalvitals-deco-pope
    environment:
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - HF_HOME=/hf_cache
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/hf_cache
      - ./outputs:/app/example/outputs
      - ./data:/app/example/data        # frozen manifests + cached COCO images
      # Judge for M2/M3/M5 (AgyModel) — uncomment + `export AGY_PATH=$(which agy)`,
      # mirroring examples/qwen_loop_agy/docker-compose.yml; or swap the judge
      # in run.py for an API model and drop these mounts.
      # - ${AGY_PATH:-~/.local/bin/agy}:/usr/local/bin/agy:ro
      # - ~/.gemini:/home/user/.gemini
      # - ~/.cache/antigravity:/home/user/.cache/antigravity
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      python run.py --model qwen3-vl-8b-instruct
